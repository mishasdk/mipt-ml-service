name: Build and Deploy service to Yandex Cloud

on:
  push:
    branches: [main]

env:
  IMAGE: cr.yandex/${{ secrets.YC_REGISTRY_ID }}/ml-service

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Yandex Container Registry
        run: |
          echo '${{ secrets.YC_SA_JSON_CREDENTIALS }}' | \
          docker login --username json_key --password-stdin cr.yandex

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE }}:${{ github.sha }}
            ${{ env.IMAGE }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Install Yandex Cloud CLI
        run: |
          curl -sSL https://storage.yandexcloud.net/yandexcloud-yc/install.sh | \
          bash -s -- -i "$HOME" -n
          echo "$HOME/bin" >> "$GITHUB_PATH"

      - name: Deploy to Serverless Container
        run: |
          echo '${{ secrets.YC_SA_JSON_CREDENTIALS }}' > /tmp/sa-key.json
          yc config set service-account-key /tmp/sa-key.json
          yc config set folder-id ${{ secrets.YC_FOLDER_ID }}
          yc serverless container revision deploy \
            --container-id ${{ secrets.YC_CONTAINER_ID }} \
            --service-account-id ${{ secrets.YC_SERVICE_ACCOUNT_ID }} \
            --image ${{ env.IMAGE }}:${{ github.sha }} \
            --cores 1 \
            --memory 512MB \
            --concurrency 8 \
            --execution-timeout 30s \
            --environment SERVICE_VERSION=1.0.${{ github.run_number }}
          rm /tmp/sa-key.json
